name: DestinyOne Toronto mobile pilot build

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type BUILD_TORONTO_PILOT after reviewing the target commit and backend
        required: true
        type: string
      platform:
        description: Physical-device build platform
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all
      credentials_preconfigured:
        description: Expo and platform signing credentials are already configured
        required: true
        default: false
        type: boolean
      change_ticket:
        description: Approved pilot change or QA ticket reference
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: destinyone-mobile-toronto-pilot
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:check

  request-signed-build:
    needs: validate
    if: inputs.confirm == 'BUILD_TORONTO_PILOT' && inputs.credentials_preconfigured && inputs.change_ticket != ''
    runs-on: ubuntu-latest
    environment: toronto-pilot-mobile
    env:
      EXPO_TOKEN: ${{ secrets.PILOT_EXPO_TOKEN }}
      APP_VARIANT: pilot
      EXPO_PUBLIC_APP_ENV: staging
      EXPO_PUBLIC_REQUIRE_REAL_BACKEND: 'true'
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.PILOT_EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PILOT_EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.PILOT_EXPO_TOKEN }}
      - name: Verify pilot environment again before remote build
        run: pnpm mobile:build:verify
      - name: Request signed EAS build from the reviewed commit
        run: |
          mkdir -p artifacts
          eas build --profile toronto-pilot --platform "${{ inputs.platform }}" --non-interactive --no-wait --json > artifacts/eas-pilot-build-request.json
      - name: Upload non-secret build request evidence
        uses: actions/upload-artifact@v4
        with:
          name: eas-toronto-pilot-build-${{ github.sha }}
          path: artifacts/eas-pilot-build-request.json
          if-no-files-found: error
          retention-days: 30
